services:
  postgres:
    image: docker.io/library/postgres:16
    container_name: finance-tracker-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-finance_tracker}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - finance_tracker_postgres:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Containerfile
    container_name: finance-tracker-backend
    depends_on:
      - postgres
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/${DB_NAME:-finance_tracker}
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      JWT_SECRET: ${JWT_SECRET:-change-me-change-me-change-me-change-me}
      APP_ALLOWED_ORIGINS: ${APP_ALLOWED_ORIGINS:-http://localhost:5173}
    ports:
      - "8080:8080"

  frontend:
    build:
      context: .
      dockerfile: ./frontend/Containerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080}
    container_name: finance-tracker-frontend
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  finance_tracker_postgres:
